<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Projects</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>
    <main class="project-home">
        <section class="hero">
            <div class="top-line"></div>

            <p class="mini-title">MAPLESTORY</p>

            <h1>성장 일기</h1>

            <p class="subtitle">
                Grow steadily.<br>
                Record everything.
            </p>

            <p class="desc">
                작은 성장도 기록하면 큰 변화가 됩니다.<br>
                플레이 기록을 체계적으로 관리해 보세요. <a class="write" href="./write/">기록하기</a>
            </p>

            <nav class="button-grid" aria-label="서브 프로젝트 링크 목록">
                <a class="project-button" href="./list/?type=daily">
                    <span class="button-kicker">Daily</span>
                    <strong>일일 정산</strong>
                    <small>일일 기록을 확인합니다.</small>
                </a>

                <a class="project-button" href="./list/?type=weekly">
                    <span class="button-kicker">Weekly</span>
                    <strong>주간 정산</strong>
                    <small>주간 기록을 확인합니다.</small>
                </a>

                <a class="project-button" href="./list/?type=monthly">
                    <span class="button-kicker">Monthly</span>
                    <strong>월간 정산</strong>
                    <small>월간 기록을 확인합니다.</small>
                </a>
            </nav>

            <div class="bottom-area">
                <a class="plain-link" href="/">← 처음으로</a>
                <div class="bottom-line"></div>
            </div>
        </section>
